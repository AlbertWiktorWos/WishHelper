# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    public_base_url: '/uploads'
    currency_api.url: 'https://api.freecurrencyapi.com/v1'
    currency_api.key: '%env(CURRENCY_API_KEY)%'
    currency_api.defaultCurrency: '%env(CURRENCY_API_DEFAULT_CURRENCY)%'
    ai_api_key: '%env(AI_API_KEY)%'
    ai_base_url: '%env(AI_BASE_URL)%'
    ai_model_code: '%env(AI_MODEL_CODE)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    #Service with Listener that send emails - we set default sender for all the emails in the app
    Symfony\Component\Mailer\EventListener\EnvelopeListener:
        arguments:
            - '%env(MAIL_SENDER)%' #sender

    App\EventSubscriber\TagCleanupSubscriber:
        arguments:
            $tagService: '@App\Service\Item\TagService'
        tags:
            - { name: doctrine.event_subscriber }

    App\Service\Infrastructure\FileHelper:
        arguments:
            $publicStorage: '@public.storage'
            $publicBaseUrl: '%public_base_url%'

    App\EventListener\KernelViewListenerCSFR:
        tags:
            - { name: 'kernel.event_listener', event: 'kernel.view', method: 'onKernelView' }

    App\Integration\RestIntegration\CurrencyApi\CurrencyApiClientInterface:
        class: App\Integration\RestIntegration\CurrencyApi\CurrencyApiClient
        arguments:
            $apiKey: '%currency_api.key%'
            $baseUrl: '%currency_api.url%'

    App\Integration\RestIntegration\CurrencyApi\Provider\CurrencyRatesProvider:
        arguments:
            $defaultBaseCurrency: '%currency_api.defaultCurrency%'

    App\Integration\SoapIntegration\CountryApi\CountryCommInterface:
        class: App\Integration\SoapIntegration\CountryApi\CountryComm
        arguments:
            $wsdl: 'http://webservices.oorsprong.org/websamples.countryinfo/CountryInfoService.wso?WSDL'
            $retries: 3

    App\State\WishItemProvider:
        class: App\State\WishItemProvider
        arguments:
            $defaultBaseCurrency: '%currency_api.defaultCurrency%'

    App\Integration\RestIntegration\OpenRouter\OpenRouterClientInterface:
        class: App\Integration\RestIntegration\OpenRouter\OpenRouterClient
        arguments:
            $apiKey: '%ai_api_key%'
            $baseUrl: '%ai_base_url%'

    App\Integration\RestIntegration\OpenRouter\Provider\ChatProvider:
        arguments:
            $model: '%ai_model_code%'

    App\Service\Infrastructure\MercureTokenGenerator:
        arguments:
            $mercureSecret: '%env(MERCURE_JWT_SECRET)%'

    App\Service\Item\WishFactory:
        arguments:
            $chatProvider: '@App\Integration\RestIntegration\OpenRouter\Provider\ChatProvider'
            $defaultBaseCurrency: '%currency_api.defaultCurrency%'

when@test:
    services:
        # we disable CSRF checking during tests
        App\EventSubscriber\CsrfSubscriber: null
        # we disable TagCleanupSubscriber during tests
        App\EventSubscriber\TagCleanupSubscriber: null

        App\Integration\RestIntegration\CurrencyApi\CurrencyApiClientInterface:
            class: App\Integration\RestIntegration\CurrencyApi\MockCurrencyApiClient
            arguments:
                $baseUrl: 'test'

        App\Service\Item\CurrencyUpdater:
            public: true
            arguments:
                $currencyRatesProvider: '@App\Integration\RestIntegration\CurrencyApi\Provider\CurrencyRatesProvider'
                $currenciesInfoProvider: '@App\Integration\RestIntegration\CurrencyApi\Provider\CurrenciesInfoProvider'
                $repository: '@App\Repository\CurrencyRepository'
                $em: '@doctrine.orm.entity_manager'
                $logger: '@monolog.logger'
                $cache: '@cache.app'

        App\Integration\SoapIntegration\CountryApi\CountryCommInterface:
            class: App\Integration\SoapIntegration\CountryApi\MockCountryComm
            arguments:
                $logger: '@monolog.logger'

        App\Service\Item\CountryUpdater:
            public: true
            arguments:
                $countryInfoProvider: '@App\Integration\SoapIntegration\CountryApi\Provider\CountryInfoProvider'
                $countryRepository: '@App\Repository\CountryRepository'
                $currencyRepository: '@App\Repository\CurrencyRepository'
                $em: '@doctrine.orm.entity_manager'
                $logger: '@monolog.logger'
                $cache: '@cache.app'
                $defaultBaseCurrency: '%currency_api.defaultCurrency%'

        App\Integration\RestIntegration\OpenRouter\OpenRouterClientInterface:
            class: App\Integration\RestIntegration\OpenRouter\MockOpenRouterClient
            arguments:
                $baseUrl: '%ai_base_url%'
